# SpecSync 5 configuration
specs_dir = "specs"
source_dirs = ["."]
exclude_dirs = [".git", ".specsync", ".claude", ".codex", ".cursor", ".gemini"]
exclude_patterns = []
required_sections = ["Purpose", "Public API", "Invariants", "Behavioral Examples", "Error Cases", "Dependencies", "Change Log"]
enforcement = "strict"
[lifecycle]
track_history = false
